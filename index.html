<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PrismaCursos - Plataforma de cursos online">
  <title>PrismaCursos</title>

  <!-- Google Fonts: League Spartan + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=League+Spartan:wght@600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- ============ HEADER ============ -->
  <header id="header">
    <nav id="navbar">
      <!-- Logo + Nome à esquerda -->
      <a href="#" class="logo" id="logo-link">
        <img src="assets/PrismaLogo.png" alt="Prisma Logo" class="logo-img" id="logo-img">
        <span class="logo-text">Prisma Cursos</span>
      </a>

      <!-- Hamburger Menu à direita -->
      <button class="hamburger" id="hamburger-btn" aria-label="Abrir menu" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </nav>

    <!-- Overlay do menu -->
    <div class="menu-overlay" id="menu-overlay">
      <ul class="menu-list" id="menu-list">
        <li class="menu-item">
          <a href="#prisma" class="menu-link" id="menu-link-prisma">
            <span class="menu-icon">▲</span>
            <span class="menu-label">Prisma</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#quem-somos" class="menu-link" id="menu-link-quem-somos">
            <span class="menu-icon">▲</span>
            <span class="menu-label">Quem Somos</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#quiz" class="menu-link" id="menu-link-quiz">
            <span class="menu-icon">▲</span>
            <span class="menu-label">Quiz</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#cursos" class="menu-link" id="menu-link-cursos">
            <span class="menu-icon">▲</span>
            <span class="menu-label">Cursos</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#depoimento" class="menu-link" id="menu-link-depoimento">
            <span class="menu-icon">▲</span>
            <span class="menu-label">Depoimento</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#contato" class="menu-link" id="menu-link-contato">
            <span class="menu-icon">▲</span>
            <span class="menu-label">Contato</span>
          </a>
        </li>
      </ul>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main id="main-content">
    <section id="hero">
      <h1>Bem-vindo ao PrismaCursos</h1>
      <p>Sua plataforma de cursos online.</p>
    </section>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer id="footer">
    <p>&copy; 2026 PrismaCursos &mdash; Todos os direitos reservados.</p>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
